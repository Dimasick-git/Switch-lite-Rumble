name: build

on:
  push:
    branches: [ main ]
    paths:
      - 'software/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'software/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  # Reliable baseline: the plain-libnx capture/diagnostic sysmodule.
  rumble-tap-libnx:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    env:
      TITLE_ID: "0100000000ABE100"
    steps:
      - uses: actions/checkout@v4
      - name: Build rumble-tap-sysmodule
        run: |
          export DEVKITPRO=/opt/devkitpro
          cd software/rumble-tap-sysmodule
          make -j$(nproc)
      - name: Package for SD card
        run: |
          NSP=$(find software/rumble-tap-sysmodule -maxdepth 1 -name '*.nsp' | head -1)
          DEST="dist/atmosphere/contents/${TITLE_ID}"
          mkdir -p "${DEST}/flags"
          cp "${NSP}" "${DEST}/exefs.nsp"
          : > "${DEST}/flags/boot2.flag"
      - name: Upload SD-ready package
        uses: actions/upload-artifact@v4
        with:
          name: rumble-tap-sysmodule-SD
          path: dist

  # The libstratosphere hid MITM that logs what a *game* sends.
  rumble-logger-mitm:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    env:
      TITLE_ID: "0100000000ABE200"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build rumble-logger-mitm
        run: |
          export DEVKITPRO=/opt/devkitpro
          cd software/rumble-logger-mitm
          make -j$(nproc)
      - name: Package for SD card
        run: |
          NSP=$(find software/rumble-logger-mitm/out -name '*.nsp' | head -1)
          DEST="dist/atmosphere/contents/${TITLE_ID}"
          mkdir -p "${DEST}/flags"
          cp "${NSP}" "${DEST}/exefs.nsp"
          : > "${DEST}/flags/boot2.flag"
      - name: Upload SD-ready package
        uses: actions/upload-artifact@v4
        with:
          name: rumble-logger-mitm-SD
          path: dist

  # Combine both sysmodules into one SD-ready bundle: extract to SD root.
  package:
    runs-on: ubuntu-latest
    needs: [rumble-tap-libnx, rumble-logger-mitm]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rumble-tap-sysmodule-SD
          path: bundle
      - uses: actions/download-artifact@v4
        with:
          name: rumble-logger-mitm-SD
          path: bundle
      - name: Show bundle contents
        run: find bundle -type f | sort
      - name: Upload combined SD bundle
        uses: actions/upload-artifact@v4
        with:
          name: Switch-lite-Rumble-SD
          path: bundle
